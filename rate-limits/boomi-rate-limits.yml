description: Boomi does not publish a single global per-second / per-minute rate-limit for its platform
  REST, SOAP, and GraphQL APIs. Limits are enforced per service (Platform API, API Management gateway,
  Event Streams, MFT) and are bound to the customer's contracted edition. Consumers should expect HTTP
  429 throttling, apply exponential backoff, and consult the service-specific docs for any published
  per-endpoint ceilings.
sources:
  - https://boomi.com/pricing/
  - https://help.boomi.com/
notes: Per-service / per-endpoint rate limits are not consolidated on a public page; reconcile with the
  service-specific documentation in help.boomi.com.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Boomi Platform REST API
    scope: account
    metric: varies
    limit: 'see service-specific documentation'
    notes: Limits vary by edition and endpoint.
  - name: Boomi API Management gateway
    scope: account
    metric: varies
    limit: 'configurable per API contract'
    notes: API Management lets administrators define per-contract throttling on published APIs.
  - name: Boomi Event Streams REST API
    scope: account
    metric: varies
    limit: 'see service-specific documentation'
  - name: Boomi DataHub API
    scope: account
    metric: varies
    limit: 'see service-specific documentation'
  - name: Boomi MFT API
    scope: account
    metric: varies
    limit: 'see service-specific documentation'
  - name: Boomi API Gateway GraphQL API
    scope: account
    metric: varies
    limit: 'see service-specific documentation'
policies:
  - name: Backoff Strategy
    description: Apply exponential backoff with jitter on 429 and 5xx responses; honor Retry-After when
      present.
  - name: Edition-Bound Capacity
    description: Effective request capacity is set by the contracted edition (Professional through Enterprise
      Plus); upgrade or scale-out is required for higher steady-state throughput.
  - name: Configurable Throttling (API Management)
    description: For APIs published through Boomi API Management, throttling policies are administrator-defined
      per API contract and applied at the gateway layer.
  - name: Fair Use
    description: Sustained traffic that materially impacts shared infrastructure is reviewed and may trigger
      throttling regardless of contract.
maintainers:
