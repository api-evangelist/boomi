description: 'FOCUS-aligned FinOps for Boomi: tiered subscription editions across Integration, API Management,
  Data Hub, and Data Integration product lines, with a Pay-as-you-Go option ($99/month plus usage) and
  contact-sales pricing for upper tiers.'
sources:
  - https://boomi.com/pricing/
  - https://help.boomi.com/
billingModel:
  pricingCategory: Tiered Subscription + Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Boomi
  ServiceCategory: Integration Platform
  ProviderName: Boomi
  PublisherName: Boomi, LP
  InvoiceIssuerName: Boomi, LP
  BillingCurrency: USD
  PricingCategory: Standard
  PricingUnit: subscription-month
meters:
  - name: subscription_month
    description: Edition subscription fee billed monthly per account.
    unit: month
    aggregation: sum
    dimensions:
      - product_line
      - edition
  - name: connections
    description: Number of provisioned source/target connections; connection count gates upgrades between
      editions.
    unit: connection
    aggregation: max
    dimensions:
      - product_line
      - connection_type
  - name: runtime_environments
    description: Atom / molecule runtime environments deployed against the account.
    unit: environment
    aggregation: max
    dimensions:
      - environment_type
      - region
  - name: api_management_calls
    description: API calls flowing through Boomi API Management gateway.
    unit: request
    aggregation: sum
    dimensions:
      - api
      - contract
      - environment
  - name: mft_transfers
    description: Managed File Transfer events processed under the MFT product line.
    unit: transfer
    aggregation: sum
    dimensions:
      - direction
      - partner
  - name: data_hub_records
    description: Records mastered / synchronized through Boomi Data Hub.
    unit: record
    aggregation: max
    dimensions:
      - domain
  - name: pay_as_you_go_usage
    description: Usage component metered on top of the $99/month Pay-as-you-Go platform fee.
    unit: varies
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Pull invoices and platform usage exports from the Boomi AtomSphere admin console; track
      connection count, runtime hours, and API Management call volume against the contracted edition's
      ceilings.
  - name: Allocation
    description: Tag processes, APIs, and connections by business unit and environment so platform fees
      and gateway calls allocate cleanly to consuming products.
  - name: Optimization
    description: Right-size the edition to the actual connection / process count, retire unused integrations,
      consolidate runtimes where high availability is not required, and apply gateway-level throttling
      to control downstream cost.
  - name: Accountability
    description: Designate an integration / API platform owner per business unit; review monthly invoices
      and renewal posture against process and API growth, and use Premier / Premier Plus support tiers
      where uptime tolerance is low.
maintainers:
