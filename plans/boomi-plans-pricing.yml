description: Boomi packages its iPaaS as multiple subscription editions across Integration, API Management,
  Data Hub, and Data Integration product lines. Editions ladder Professional, Professional Plus, Enterprise,
  and Enterprise Plus, all sold as contact-sales. A self-service Pay-as-you-Go option starts at $99/month
  plus usage, and a 30-day Free Trial provides full Enterprise Platform access. Replace contact-sales tiers
  with negotiated terms when available.
sources:
  - https://boomi.com/pricing/
plans:
  - id: boomi-free-trial
    name: Free Trial
    type: freemium
    description: 30-day Free Trial with full Enterprise Platform access.
    entries:
      - label: Trial period
        name: trial_period
        type: quota
        metric: day
        limit: 30
        timeFrame: usage
        geo: global
        unit: 1
        price: '0'
        userMultiplied: false
    elements:
      - name: Full Enterprise Platform Access
      - name: Core Integration Features
      - name: Low-Code Development
      - name: Data Mapping
      - name: Basic API Management
  - id: boomi-pay-as-you-go
    name: Pay-as-You-Go
    type: usage-based
    description: Self-service entry edition with no contract; flat monthly platform fee plus usage.
    entries:
      - label: Platform fee
        name: platform_fee
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: $99/month
        userMultiplied: false
      - label: Usage
        name: usage
        type: metered
        metric: varies
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see vendor pricing - billed monthly
        userMultiplied: false
    elements:
      - name: Full Platform Access
      - name: No Contract Required
      - name: Credit Card Signup
      - name: Boomi Integration
