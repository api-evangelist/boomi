naftiko: 1.0.0-alpha2
info:
  label: Boomi Event Streams REST API — Messages
  description: 'Boomi Event Streams REST API — Messages. 1 operations. Lead operation: Boomi Publish messages to a topic.
    Self-contained Naftiko capability covering one Boomi business surface.'
  tags:
  - Boomi
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOOMI_API_KEY: BOOMI_API_KEY
capability:
  consumes:
  - type: http
    namespace: event-streams-messages
    baseUri: https://{topicEndpoint}
    description: Boomi Event Streams REST API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: root
      path: /
      operations:
      - name: publishmessages
        method: POST
        description: Boomi Publish messages to a topic
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.BOOMI_API_KEY}}'
  exposes:
  - type: rest
    namespace: event-streams-messages-rest
    port: 8080
    description: REST adapter for Boomi Event Streams REST API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1
      name: root
      description: REST surface for root.
      operations:
      - method: POST
        name: publishmessages
        description: Boomi Publish messages to a topic
        call: event-streams-messages.publishmessages
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: event-streams-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Boomi Event Streams REST API — Messages. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: boomi-publish-messages-topic
      description: Boomi Publish messages to a topic
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: event-streams-messages.publishmessages
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
