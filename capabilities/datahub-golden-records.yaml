naftiko: 1.0.0-alpha2
info:
  label: Boomi DataHub API — Golden Records
  description: 'Boomi DataHub API — Golden Records. 1 operations. Lead operation: Boomi List golden records. Self-contained
    Naftiko capability covering one Boomi business surface.'
  tags:
  - Boomi
  - Golden Records
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOOMI_API_KEY: BOOMI_API_KEY
capability:
  consumes:
  - type: http
    namespace: datahub-golden-records
    baseUri: https://mdh.boomi.com/mdh
    description: Boomi DataHub API — Golden Records business capability. Self-contained, no shared references.
    resources:
    - name: repositories-repositoryId-universes-universeId-records
      path: /repositories/{repositoryId}/universes/{universeId}/records
      operations:
      - name: listgoldenrecords
        method: GET
        description: Boomi List golden records
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pageSize
          in: query
          type: integer
          description: Number of records per page.
        - name: pageToken
          in: query
          type: string
          description: Pagination token from a previous response.
    authentication:
      type: bearer
      token: '{{env.BOOMI_API_KEY}}'
  exposes:
  - type: rest
    namespace: datahub-golden-records-rest
    port: 8080
    description: REST adapter for Boomi DataHub API — Golden Records. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repositories/{repositoryid}/universes/{universeid}/records
      name: repositories-repositoryid-universes-universeid-records
      description: REST surface for repositories-repositoryId-universes-universeId-records.
      operations:
      - method: GET
        name: listgoldenrecords
        description: Boomi List golden records
        call: datahub-golden-records.listgoldenrecords
        with:
          pageSize: rest.pageSize
          pageToken: rest.pageToken
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datahub-golden-records-mcp
    port: 9090
    transport: http
    description: MCP adapter for Boomi DataHub API — Golden Records. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: boomi-list-golden-records
      description: Boomi List golden records
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datahub-golden-records.listgoldenrecords
      with:
        pageSize: tools.pageSize
        pageToken: tools.pageToken
      outputParameters:
      - type: object
        mapping: $.
