naftiko: 1.0.0-alpha2
info:
  label: Boomi DataHub API — Repositories
  description: 'Boomi DataHub API — Repositories. 4 operations. Lead operation: Boomi List repositories. Self-contained Naftiko
    capability covering one Boomi business surface.'
  tags:
  - Boomi
  - Repositories
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOOMI_API_KEY: BOOMI_API_KEY
capability:
  consumes:
  - type: http
    namespace: datahub-repositories
    baseUri: https://mdh.boomi.com/mdh
    description: Boomi DataHub API — Repositories business capability. Self-contained, no shared references.
    resources:
    - name: repositories
      path: /repositories
      operations:
      - name: listrepositories
        method: GET
        description: Boomi List repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createrepository
        method: POST
        description: Boomi Create a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: repositories-repositoryId
      path: /repositories/{repositoryId}
      operations:
      - name: getrepository
        method: GET
        description: Boomi Get a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleterepository
        method: DELETE
        description: Boomi Delete a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.BOOMI_API_KEY}}'
  exposes:
  - type: rest
    namespace: datahub-repositories-rest
    port: 8080
    description: REST adapter for Boomi DataHub API — Repositories. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repositories
      name: repositories
      description: REST surface for repositories.
      operations:
      - method: GET
        name: listrepositories
        description: Boomi List repositories
        call: datahub-repositories.listrepositories
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createrepository
        description: Boomi Create a repository
        call: datahub-repositories.createrepository
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repositories/{repositoryid}
      name: repositories-repositoryid
      description: REST surface for repositories-repositoryId.
      operations:
      - method: GET
        name: getrepository
        description: Boomi Get a repository
        call: datahub-repositories.getrepository
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleterepository
        description: Boomi Delete a repository
        call: datahub-repositories.deleterepository
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datahub-repositories-mcp
    port: 9090
    transport: http
    description: MCP adapter for Boomi DataHub API — Repositories. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: boomi-list-repositories
      description: Boomi List repositories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datahub-repositories.listrepositories
      outputParameters:
      - type: object
        mapping: $.
    - name: boomi-create-repository
      description: Boomi Create a repository
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datahub-repositories.createrepository
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: boomi-get-repository
      description: Boomi Get a repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datahub-repositories.getrepository
      outputParameters:
      - type: object
        mapping: $.
    - name: boomi-delete-repository
      description: Boomi Delete a repository
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: datahub-repositories.deleterepository
      outputParameters:
      - type: object
        mapping: $.
