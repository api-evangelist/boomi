naftiko: 1.0.0-alpha2
info:
  label: Boomi Platform REST API — Atoms
  description: 'Boomi Platform REST API — Atoms. 4 operations. Lead operation: Boomi Query Atoms. Self-contained Naftiko capability
    covering one Boomi business surface.'
  tags:
  - Boomi
  - Atoms
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOOMI_API_KEY: BOOMI_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-rest-atoms
    baseUri: https://api.boomi.com/api/rest/v1/{accountId}
    description: Boomi Platform REST API — Atoms business capability. Self-contained, no shared references.
    resources:
    - name: Atom-query
      path: /Atom/query
      operations:
      - name: queryatoms
        method: POST
        description: Boomi Query Atoms
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: Atom-id
      path: /Atom/{id}
      operations:
      - name: getatom
        method: GET
        description: Boomi Get an Atom
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateatom
        method: POST
        description: Boomi Update an Atom
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteatom
        method: DELETE
        description: Boomi Delete an Atom
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.BOOMI_USER}}'
      password: '{{env.BOOMI_PASS}}'
  exposes:
  - type: rest
    namespace: platform-rest-atoms-rest
    port: 8080
    description: REST adapter for Boomi Platform REST API — Atoms. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/atom/query
      name: atom-query
      description: REST surface for Atom-query.
      operations:
      - method: POST
        name: queryatoms
        description: Boomi Query Atoms
        call: platform-rest-atoms.queryatoms
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/atom/{id}
      name: atom-id
      description: REST surface for Atom-id.
      operations:
      - method: GET
        name: getatom
        description: Boomi Get an Atom
        call: platform-rest-atoms.getatom
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateatom
        description: Boomi Update an Atom
        call: platform-rest-atoms.updateatom
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteatom
        description: Boomi Delete an Atom
        call: platform-rest-atoms.deleteatom
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-rest-atoms-mcp
    port: 9090
    transport: http
    description: MCP adapter for Boomi Platform REST API — Atoms. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: boomi-query-atoms
      description: Boomi Query Atoms
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-rest-atoms.queryatoms
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: boomi-get-atom
      description: Boomi Get an Atom
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-rest-atoms.getatom
      outputParameters:
      - type: object
        mapping: $.
    - name: boomi-update-atom
      description: Boomi Update an Atom
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-rest-atoms.updateatom
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: boomi-delete-atom
      description: Boomi Delete an Atom
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-rest-atoms.deleteatom
      outputParameters:
      - type: object
        mapping: $.
