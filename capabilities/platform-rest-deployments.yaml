        mapping: $.
    - name: boomi-undeploy-package
      description: Boomi Undeploy a package
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-rest-deployments.deletedeployedpackage
      outputParameters:
      - type: object
        mapping: $.
