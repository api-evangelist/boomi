naftiko: 1.0.0-alpha2
info:
  label: Boomi Platform REST API — Processes
  description: 'Boomi Platform REST API — Processes. 7 operations. Lead operation: Boomi Create a process. Self-contained
    Naftiko capability covering one Boomi business surface.'
  tags:
  - Boomi
  - Processes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BOOMI_API_KEY: BOOMI_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-rest-processes
    baseUri: https://api.boomi.com/api/rest/v1/{accountId}
    description: Boomi Platform REST API — Processes business capability. Self-contained, no shared references.
    resources:
    - name: Process
      path: /Process
      operations:
      - name: createprocess
        method: POST
        description: Boomi Create a process
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: Process-query
      path: /Process/query
      operations:
      - name: queryprocesses
        method: POST
        description: Boomi Query processes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: Process-id
      path: /Process/{id}
      operations:
      - name: getprocess
        method: GET
        description: Boomi Get a process
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateprocess
        method: POST
        description: Boomi Update a process
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteprocess
        method: DELETE
        description: Boomi Delete a process
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ProcessSchedules-id
      path: /ProcessSchedules/{id}
      operations:
      - name: getprocessschedules
        method: GET
        description: Boomi Get process schedules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateprocessschedules
        method: POST
        description: Boomi Update process schedules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.BOOMI_USER}}'
      password: '{{env.BOOMI_PASS}}'
  exposes:
  - type: rest
    namespace: platform-rest-processes-rest
    port: 8080
    description: REST adapter for Boomi Platform REST API — Processes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/process
      name: process
      description: REST surface for Process.
      operations:
      - method: POST
        name: createprocess
        description: Boomi Create a process
        call: platform-rest-processes.createprocess
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/process/query
      name: process-query
      description: REST surface for Process-query.
      operations:
      - method: POST
        name: queryprocesses
        description: Boomi Query processes
        call: platform-rest-processes.queryprocesses
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/process/{id}
      name: process-id
      description: REST surface for Process-id.
      operations:
      - method: GET
        name: getprocess
        description: Boomi Get a process
        call: platform-rest-processes.getprocess
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateprocess
        description: Boomi Update a process
        call: platform-rest-processes.updateprocess
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteprocess
        description: Boomi Delete a process
        call: platform-rest-processes.deleteprocess
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/processschedules/{id}
      name: processschedules-id
      description: REST surface for ProcessSchedules-id.
      operations:
      - method: GET
        name: getprocessschedules
        description: Boomi Get process schedules
        call: platform-rest-processes.getprocessschedules
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateprocessschedules
        description: Boomi Update process schedules
        call: platform-rest-processes.updateprocessschedules
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-rest-processes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Boomi Platform REST API — Processes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: boomi-create-process
      description: Boomi Create a process
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-rest-processes.createprocess
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
