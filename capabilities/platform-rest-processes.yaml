      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-rest-processes.getprocessschedules
      outputParameters:
      - type: object
        mapping: $.
    - name: boomi-update-process-schedules
      description: Boomi Update process schedules
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-rest-processes.updateprocessschedules
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
